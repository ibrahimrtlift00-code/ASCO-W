<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASCO Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;

background:linear-gradient(
135deg,
#0a1f44,
#1c5db6,
#3576b9
);

background-size:300% 300%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:100%;
max-width:650px;

padding:35px 25px;

background:rgba(255,255,255,0.12);

border:1px solid rgba(255,255,255,0.2);

border-radius:28px;

box-shadow:
0 10px 30px rgba(0,0,0,.25);

text-align:center;

color:white;
}

.logo{
font-size:32px;
font-weight:700;
margin-bottom:20px;
letter-spacing:1px;
}

.message{
font-size:clamp(22px,5vw,34px);
font-weight:700;
line-height:1.7;
margin-bottom:15px;

animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.subtitle{
font-size:17px;
opacity:.9;
margin-bottom:20px;
}

.heart-container{
display:flex;
justify-content:center;
}

.heart{
font-size:32px;
color:#ff5b7d;
animation:heartBeat 1.8s infinite;
}

@keyframes heartBeat{
0%{transform:scale(1);}
20%{transform:scale(1.15);}
40%{transform:scale(1);}
60%{transform:scale(1.2);}
80%{transform:scale(1);}
100%{transform:scale(1);}
}

@media(max-width:768px){

.card{
padding:28px 18px;
}

.logo{
font-size:24px;
}

.message{
font-size:24px;
}

.subtitle{
font-size:14px;
}

.heart{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="card">

<div class="logo">
ASCO GROUP
</div>

<div id="message" class="message">
جاري التحميل...
</div>

<div class="subtitle">
Welcome To ASCO
</div>

<div class="heart-container">
<div class="heart">❤</div>
</div>

</div>

<script>

const messages = {

"001":"اهلاً بكم في ASCO",
"002":"شكراً لجهودكم",
"003":"نتمنى لكم دوام النجاح"

};

const params = new URLSearchParams(window.location.search);
const card = params.get("card");

document.getElementById("message").innerText =
messages[card] || "الرسالة غير موجودة";

</script>

</body>
</html>
