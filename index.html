<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASCO Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#081229,
#0f2f67,
#3576b9
);

padding:12px;
}

.card{
width:100%;
max-width:600px;

padding:30px 20px;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.15);

border-radius:24px;

box-shadow:
0 10px 25px rgba(0,0,0,.25);

text-align:center;

color:#fff;
}

.logo{
font-size:28px;
font-weight:700;
margin-bottom:18px;
}

.message{
font-size:clamp(22px,5vw,34px);
font-weight:700;
line-height:1.6;
margin-bottom:15px;
}

.subtitle{
font-size:16px;
opacity:.9;
margin-bottom:18px;
}

.heart{
font-size:28px;
color:#ff5c7c;
animation:beat 1.8s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
25%{transform:scale(1.15);}
50%{transform:scale(1);}
75%{transform:scale(1.15);}
100%{transform:scale(1);}
}

@media (max-width:480px){

.card{
padding:24px 16px;
}

.logo{
font-size:22px;
}

.message{
font-size:22px;
}

.subtitle{
font-size:14px;
}

.heart{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="card">

<div class="logo">
ASCO GROUP
</div>

<div id="message" class="message">
جاري التحميل...
</div>

<div class="subtitle">
Welcome To ASCO
</div>

<div class="heart">
❤
</div>

</div>

<script src="./messages.js"></script>

<script>

window.onload = function(){

const params = new URLSearchParams(window.location.search);

const card = params.get("card") || "001";

if(typeof messages !== "undefined"){

document.getElementById("message").innerText =
messages[card] || "الرسالة غير موجودة";

}else{

document.getElementById("message").innerText =
"خطأ في تحميل ملف الرسائل";

}

};

</script>

</body>
</html>
