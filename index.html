<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASCO Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#081229,
#0f2f67,
#3576b9
);

padding:12px;
}

.card{
width:100%;
max-width:600px;

padding:30px 20px;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.15);

border-radius:24px;

box-shadow:
0 10px 25px rgba(0,0,0,.25);

text-align:center;

color:#fff;
}

.logo{
font-family:'Montserrat',sans-serif;
font-size:28px;
font-weight:700;
margin-bottom:18px;
}

.message{
font-size:clamp(22px,5vw,34px);
font-weight:700;
line-height:1.6;
margin-bottom:15px;
}

.subtitle{
font-size:16px;
opacity:.9;
margin-bottom:18px;
}

.heart{
font-size:28px;
color:#ff5c7c;
animation:beat 1.8s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
25%{transform:scale(1.15);}
50%{transform:scale(1);}
75%{transform:scale(1.15);}
100%{transform:scale(1);}
}

@media (max-width:480px){

.card{
padding:24px 16px;
}

.logo{
font-size:22px;
}

.message{
font-size:22px;
}

.subtitle{
font-size:14px;
}

.heart{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="card">

<div class="logo">
ASCO GROUP
</div>

<div id="message" class="message">
جاري التحميل...
</div>




</div>


<script src="./messages.js"></script>

<script>

window.onload = function(){

if(typeof messages === "undefined"){

document.getElementById("message").innerText =
"خطأ في تحميل ملف الرسائل";

return;

}

const today = new Date().toISOString().split('T')[0];

const fingerprint =
navigator.userAgent +
navigator.language +
screen.width +
screen.height +
today;

function hashCode(str){

let hash = 0;

for(let i = 0; i < str.length; i++){

hash =
((hash << 5) - hash) +
str.charCodeAt(i);

hash |= 0;

}

return Math.abs(hash);

}

const seed = hashCode(fingerprint);

const keys = Object.keys(messages);

const messageIndex = seed % keys.length;

const selectedMessage =
messages[keys[messageIndex]];

const luckSeed = seed % 1000;

let luck;

if(luckSeed < 10){

luck = 100;

}else if(luckSeed < 610){

luck =
60 + (seed % 40);

}else if(luckSeed < 860){

luck =
30 + (seed % 30);

}else{

luck =
5 + (seed % 25);

}

const messageBox =
document.getElementById("message");

let counter = 0;

const timer = setInterval(() => {

messageBox.innerHTML = `

<div style="
font-size:18px;
opacity:.8;
margin-bottom:10px;
">
جاري تحليل حظك اليوم...
</div>

<div style="
font-size:64px;
font-weight:700;
color:#ffd86b;
text-shadow:0 0 20px rgba(255,216,107,.5);
">
${counter}%
</div>

`;

counter++;

if(counter > luck){

clearInterval(timer);

setTimeout(() => {

let badge = "";

if(luck === 100){

badge = `

<div style="
margin-top:15px;
font-size:18px;
font-weight:700;
color:#ffd86b;
line-height:1.8;
">
🏆 تهانينا
<br>
أنت من 1% من موظفي ASCO
<br>
الذين حصلوا على حظ كامل اليوم
</div>

`;

}else if(luck >= 60){

badge = `

<div style="
margin-top:15px;
font-size:18px;
">
⭐ حظ ممتاز
</div>

`;

}else if(luck >= 30){

badge = `

<div style="
margin-top:15px;
font-size:18px;
">
✨ يوم جيد
</div>

`;

}else{

badge = `

<div style="
margin-top:15px;
font-size:18px;
">
💪 استمر بالتألق
</div>

`;

}

messageBox.innerHTML = `

<div style="
font-size:18px;
opacity:.8;
margin-bottom:10px;
">
نسبة حظك اليوم
</div>

<div style="
font-size:64px;
font-weight:700;
color:#ffd86b;
text-shadow:0 0 20px rgba(255,216,107,.5);
">
${luck}%
</div>

${badge}

<div style="
margin-top:25px;
font-size:26px;
line-height:1.8;
font-weight:700;
">
${selectedMessage}
</div>

`;

},500);

}

},60);

};

</script>
  

</body>
</html>
