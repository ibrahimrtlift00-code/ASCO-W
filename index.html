<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASCO Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#081229,
#0f2f67,
#3576b9
);

padding:12px;
}

.card{
width:100%;
max-width:600px;

padding:30px 20px;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.15);

border-radius:24px;

box-shadow:
0 10px 25px rgba(0,0,0,.25);

text-align:center;

color:#fff;
}

.logo{
font-size:28px;
font-weight:700;
margin-bottom:18px;
}

.message{
font-size:clamp(22px,5vw,34px);
font-weight:700;
line-height:1.6;
margin-bottom:15px;
}

.subtitle{
font-size:16px;
opacity:.9;
margin-bottom:18px;
}

.heart{
font-size:28px;
color:#ff5c7c;
animation:beat 1.8s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
25%{transform:scale(1.15);}
50%{transform:scale(1);}
75%{transform:scale(1.15);}
100%{transform:scale(1);}
}

@media (max-width:480px){

.card{
padding:24px 16px;
}

.logo{
font-size:22px;
}

.message{
font-size:22px;
}

.subtitle{
font-size:14px;
}

.heart{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="card">

<div class="logo">
ASCO GROUP
</div>

<div id="message" class="message">
جاري التحميل...
</div>

<div class="subtitle">
Welcome To ASCO
</div>

<div class="heart">
❤
</div>

</div>


<script src="./messages.js"></script>

<script>

window.onload = function(){

if(typeof messages === "undefined"){
document.getElementById("message").innerText =
"خطأ في تحميل ملف الرسائل";
return;
}

const keys = Object.keys(messages);

const today = new Date().toISOString().split('T')[0];

let savedDate = localStorage.getItem("ascoDate");
let savedMessage = localStorage.getItem("ascoMessage");
let savedLuck = localStorage.getItem("ascoLuck");

if(savedDate !== today){

const randomMessage =
keys[Math.floor(Math.random() * keys.length)];

let luck;
const chance = Math.random() * 100;

if(chance < 1){

luck = 100;

}else if(chance < 61){

luck = Math.floor(Math.random() * 40) + 60;

}else if(chance < 86){

luck = Math.floor(Math.random() * 30) + 30;

}else{

luck = Math.floor(Math.random() * 25) + 5;

}

localStorage.setItem("ascoDate", today);
localStorage.setItem("ascoMessage", randomMessage);
localStorage.setItem("ascoLuck", luck);

savedMessage = randomMessage;
savedLuck = luck;
}

savedLuck = parseInt(savedLuck);

const box = document.getElementById("message");

let counter = 0;

const timer = setInterval(function(){

box.innerHTML = `
<div style="font-size:18px;opacity:.8">
جاري تحليل حظك اليوم...
</div>

<div style="
font-size:64px;
font-weight:700;
color:#ffd86b;
margin-top:10px;
">
${counter}%
</div>
`;

counter++;

if(counter > savedLuck){

clearInterval(timer);

setTimeout(function(){

let title = "";

if(savedLuck === 100){

title = `
<div style="
margin-top:12px;
font-size:18px;
color:#ffd86b;
font-weight:700;
">
🏆 أنت من 1% من موظفي ASCO
<br>
الذين حصلوا على حظ كامل اليوم
</div>
`;

}else if(savedLuck >= 60){

title = `
<div style="margin-top:12px;font-size:18px;">
⭐ حظ ممتاز
</div>
`;

}else if(savedLuck >= 30){

title = `
<div style="margin-top:12px;font-size:18px;">
✨ يوم جيد
</div>
`;

}else{

title = `
<div style="margin-top:12px;font-size:18px;">
💪 استمر بالتألق
</div>
`;

}

box.innerHTML = `

<div style="font-size:18px;opacity:.8">
نسبة حظك اليوم
</div>

<div style="
font-size:64px;
font-weight:700;
color:#ffd86b;
margin-top:10px;
">
${savedLuck}%
</div>

${title}

<div style="
margin-top:25px;
font-size:26px;
line-height:1.8;
font-weight:700;
">
${messages[savedMessage]}
</div>

`;

},500);

}

},15);

};

</script>

  

</body>
</html>
